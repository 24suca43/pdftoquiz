<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: linear-gradient(135deg,#ffecd2,#fcb69f);
            width: 650px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* ===== Progress Bar ===== */
        .progress-container {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(to right, #00ff88, #007bff);
            animation: moveBar 2s linear infinite;
        }

        @keyframes moveBar {
            0% { margin-left: -30%; }
            100% { margin-left: 100%; }
        }

        /* ===== Timer ===== */
        .timer {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ff4444;
        }

        /* ===== Options Styling (Restored Clean Look) ===== */
        .option {
            display: block;
            background: #f4f4f4;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
        }

        .option:hover {
            background: #dcdcdc;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2193b0;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #176d80;
        }
    </style>

    <script>
        let timeLeft = 20;

        function startTimer() {
            let timer = setInterval(function() {
                document.getElementById("timer").innerHTML = timeLeft;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timer);
                    document.getElementById("quizForm").submit();
                }
            }, 1000);
        }

        window.onload = startTimer;
    </script>

</head>
<body>

<div class="card">

    <!-- Moving Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <!-- Timer -->
    <div class="timer">
        ⏳ Time Left: <span id="timer">20</span>s
    </div>

    <h2>Question {{ qno }} of {{ total }}</h2>

    <form method="POST" id="quizForm">

        <h3>{{ question.question }}</h3>

        {% for option in question.options %}
            <label class="option">
                <input type="radio" name="option" value="{{ option }}" required>
                {{ option }}
            </label>
        {% endfor %}

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
