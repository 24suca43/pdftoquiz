<!DOCTYPE html>
<html>
<head>
    <title>PDF Quiz Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="index-hero">

    <h1 class="game-title">📘 PDF Quiz Game</h1>
    <p class="game-subtitle">Turn Your Notes Into a Quiz Challenge 🎯</p>

    <div class="index-upload-box">

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <!-- Username -->
            <input type="text" 
                   name="username" 
                   placeholder="Enter Your Name" 
                   required 
                   class="username-input">

            <br><br>

            <!-- PDF Upload -->
            <label for="pdfUpload" class="custom-upload">
                📂 Choose Your PDF
            </label>
            <input id="pdfUpload" 
                   type="file" 
                   name="pdf" 
                   accept=".pdf" 
                   required>

            <br><br>

            <!-- Start Button -->
            <button type="submit" class="start-game-btn">
                🚀 Start Quiz
            </button>

        </form>

        <br><br>

        <!-- Leaderboard Button -->
        <a href="/leaderboard" class="leaderboard-btn">
            🏆 View Leaderboard
        </a>

    </div>

</div>

</body>
</html>
