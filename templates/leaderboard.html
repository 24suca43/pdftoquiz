<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="leaderboard-container">
    <h1>🏆 Leaderboard</h1>

    <table>
        <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Stars ⭐</th>
            <th>Gems 💎</th>
        </tr>

        {% for player in players %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ player[0] }}</td>
            <td>{{ player[1] }}</td>
            <td>{{ player[2] }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/" class="back-btn">⬅ Back to Home</a>
</div>

</body>
</html>
